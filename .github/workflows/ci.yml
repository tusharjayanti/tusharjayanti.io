name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

jobs:
  format:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.action != 'edited' ||
      github.event.changes.base != null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.action != 'edited' ||
      github.event.changes.base != null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.action != 'edited' ||
      github.event.changes.base != null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.action != 'edited' ||
      github.event.changes.base != null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # Audit threshold = 'high'. voyageai 0.0.8 pulls 2 known qs
  # vulnerabilities (1 low + 1 moderate, accepted pending upstream
  # fix). 'moderate' would block CI on that known state immediately;
  # 'high' gates on NEW high+ severity. Tighten to 'moderate' once
  # voyageai upgrades.
  audit:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.action != 'edited' ||
      github.event.changes.base != null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
